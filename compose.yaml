name: laravel-fashion-store

services:
    db:
        image: mysql:8.4
        ports:
            - "${DB_PORT}:3306"
        volumes:
            - mysqldata:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
            - MYSQL_DATABASE=${DB_DATABASE}
            - MYSQL_USER=${DB_USERNAME}
            - MYSQL_PASSWORD=${DB_PASSWORD}

volumes:
    mysqldata:
